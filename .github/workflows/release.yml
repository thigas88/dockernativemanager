name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate tag version matches app version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"

          TAG_BASE_VERSION="${TAG_VERSION%%-*}"

          APP_VERSION="$(jq -r '.version' src-tauri/tauri.conf.json)"

          if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "null" ]; then
            echo "Could not read app version from src-tauri/tauri.conf.json"
            exit 1
          fi

          if [ "$TAG_BASE_VERSION" != "$APP_VERSION" ]; then
            echo "Tag base version ($TAG_BASE_VERSION) does not match app version ($APP_VERSION)."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config fakeroot rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Arch Linux package is built in a dedicated step below (custom PKGBUILD + makepkg).
          args: --bundles appimage,deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: "Docker Native Manager ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false

      - name: Package for Arch Linux and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-arch

          ARCH_DEPENDS=('cairo' 'gdk-pixbuf2' 'glib2' 'gtk3' 'hicolor-icon-theme' 'libsoup3' 'webkit2gtk-4.1')
          declare -A ARCH_DEPENDS_SET
          for dep in "${ARCH_DEPENDS[@]}"; do
            ARCH_DEPENDS_SET["$dep"]=1
          done

          add_arch_dep() {
            local dep="$1"
            if [ -z "${ARCH_DEPENDS_SET[$dep]+x}" ]; then
              ARCH_DEPENDS+=("$dep")
              ARCH_DEPENDS_SET["$dep"]=1
            fi
          }

          map_deb_to_arch_dep() {
            case "$1" in
              libgtk-3-0) echo "gtk3" ;;
              libwebkit2gtk-4.1-0) echo "webkit2gtk-4.1" ;;
              libglib2.0-0) echo "glib2" ;;
              libgdk-pixbuf-2.0-0) echo "gdk-pixbuf2" ;;
              libsoup-3.0-0) echo "libsoup3" ;;
              librsvg2-2) echo "librsvg" ;;
              libcairo2) echo "cairo" ;;
              *) echo "" ;;
            esac
          }

          DEB_DEPENDS=$(jq -r '.bundle.linux.deb.depends[]? // empty' src-tauri/tauri.conf.json)

          if [ -n "$DEB_DEPENDS" ]; then
            while IFS= read -r dep; do
              [ -z "$dep" ] && continue
              DEP_WITHOUT_VERSION=$(echo "$dep" | sed -E 's/\s*\([^)]*\)//g')
              DEP_RESOLVED=false

              IFS='|' read -ra DEP_CANDIDATES <<< "$DEP_WITHOUT_VERSION"
              for DEP_CANDIDATE in "${DEP_CANDIDATES[@]}"; do
                DEP_NAME=$(echo "$DEP_CANDIDATE" | xargs)
                [ -z "$DEP_NAME" ] && continue

                MAPPED_DEP=$(map_deb_to_arch_dep "$DEP_NAME")
                if [ -n "$MAPPED_DEP" ]; then
                  add_arch_dep "$MAPPED_DEP"
                  DEP_RESOLVED=true
                  break
                fi
              done

              if [ "$DEP_RESOLVED" = false ]; then
                echo "Debian dependency '$dep' is not mapped for Arch Linux packaging."
                echo "Add a mapping in .github/workflows/release.yml (map_deb_to_arch_dep)."
                exit 1
              fi
            done <<< "$DEB_DEPENDS"
          fi

          ARCH_DEPENDS_PKGBUILD=$(printf "'%s'\n" "${ARCH_DEPENDS[@]}" | paste -sd' ' -)

          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"
          PKG_VERSION="${PKG_VERSION//-/.}"

          BIN_PATH="src-tauri/target/release/docker-native-manager"
          if [ ! -f "$BIN_PATH" ]; then
            echo "Expected binary not found at $BIN_PATH"
            exit 1
          fi

          cp "$BIN_PATH" dist-arch/
          cp src-tauri/icons/icon.png dist-arch/

          cat > dist-arch/docker-native-manager.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Docker Native Manager
          Exec=docker-native-manager
          Icon=docker-native-manager
          Type=Application
          Categories=Development;
          DESKTOP

          cat > dist-arch/PKGBUILD << EOF
          pkgname=dockernativemanager-bin
          pkgver=${PKG_VERSION}
          pkgrel=1
          pkgdesc="A powerful, native, cross-platform GUI for managing Docker environments"
          arch=('x86_64')
          url="https://github.com/pedrofariasx/dockernativemanager"
          license=('MIT')
          depends=(${ARCH_DEPENDS_PKGBUILD})
          options=('!strip')
          provides=('docker-native-manager')
          conflicts=('docker-native-manager')
          source=('docker-native-manager'
                  'icon.png'
                  'docker-native-manager.desktop')
          sha256sums=('SKIP' 'SKIP' 'SKIP')

          package() {
            install -Dm755 "\${srcdir}/docker-native-manager" \
              "\${pkgdir}/usr/bin/docker-native-manager"

            install -Dm644 "\${srcdir}/icon.png" \
              "\${pkgdir}/usr/share/icons/hicolor/256x256/apps/docker-native-manager.png"

            install -Dm644 "\${srcdir}/docker-native-manager.desktop" \
              "\${pkgdir}/usr/share/applications/docker-native-manager.desktop"
          }
          EOF

          # Using archlinux:latest instead of base-devel as it is more reliable on Docker Hub
          docker run --rm \
            -v "$PWD/dist-arch:/build" \
            -w /build \
            archlinux:latest bash -c "
              pacman-key --init && pacman-key --populate archlinux &&
              pacman -Syu --noconfirm --needed base-devel namcap &&
              useradd -m builduser &&
              echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
              chown -R builduser:builduser /build &&
              su - builduser -c 'cd /build && makepkg -s --noconfirm' &&
              namcap *.pkg.tar.zst || true
            "

          ARCH_PKG=$(ls dist-arch/*.pkg.tar.zst)
          gh release upload "${{ github.ref_name }}" "$ARCH_PKG" --clobber

      - name: Package tar.gz and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-targz

          BIN_PATH="src-tauri/target/release/docker-native-manager"
          if [ ! -f "$BIN_PATH" ]; then
            echo "Expected binary not found at $BIN_PATH"
            exit 1
          fi

          PKG_VERSION="${{ github.ref_name }}"
          PKG_VERSION="${PKG_VERSION#v}"

          cp "$BIN_PATH" dist-targz/
          cp LICENSE dist-targz/

          TAR_GZ="Docker.Native.Manager_${PKG_VERSION}_amd64.tar.gz"
          tar -C dist-targz -czf "$TAR_GZ" docker-native-manager LICENSE

          gh release upload "${{ github.ref_name }}" "$TAR_GZ" --clobber
