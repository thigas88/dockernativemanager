version: 2
updates:
  # Frontend: React / Vite / TS (package.json + pnpm-lock.yaml na raiz)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Agrupa minor + patch num PR só pra reduzir ruído
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"

  # Backend Tauri: dependências Rust (src-tauri/Cargo.toml)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(rust)"

  # Actions usadas nos workflows (.github/workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
